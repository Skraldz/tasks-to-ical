services:
  tasks-to-ical:
    build: ./tasks-to-ical
    container_name: tasks_to_ical
    env_file:
      - .env
    environment:
      - PUID=1000
      - GUID=1000
      - TZ=Europe/Copenhagen
    volumes:
      - ./tasks-to-ical/credentials.json:/tasks-to-ical/credentials.json
      - ./tasks-to-ical/token.json:/tasks-to-ical/token.json
    ports:
      - 9090:8080
    restart: unless-stopped